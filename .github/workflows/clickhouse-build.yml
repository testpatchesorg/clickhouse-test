name: Build ClickHouse from source

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit ClickHouse для сборки'
        required: false
        default: 'master'
        type: string
      build_type:
        description: 'CMake build type'
        required: false
        default: 'RelWithDebInfo'
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug
      build_target:
        description: 'What to build: only Clickhouse (recommended) or all targets (Ninja, longer and harder)'
        required: false
        default: 'clickhouse'
        type: choice
        options:
          - clickhouse
          - all
      enable_rust:
        description: 'Build with Rust-dependencies'
        required: false
        default: true
        type: boolean
      ext-cache:
        description: External build cache URL
        required: false
        default: "https://clck.ru/3UHzUw"
        type: string

env:
  CH_REF: ${{ inputs.ref }}
  CH_BUILD_TYPE: ${{ inputs.build_type }}
  CH_BUILD_TARGET: ${{ inputs.build_target }}
  RUST_NIGHTLY: nightly-2026-03-22
  CLANG_VERSION: 21

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout ClickHouse with all submodules
        uses: actions/checkout@v6.0.3
        with:
          repository: ClickHouse/ClickHouse
          ref: ${{ env.CH_REF }}
          submodules: recursive
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git cmake ccache python3 ninja-build \
            nasm yasm gawk lsb-release wget software-properties-common gnupg

      - name: Install Clang ${{ env.CLANG_VERSION }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.CLANG_VERSION }}
          echo "CC=clang-${{ env.CLANG_VERSION }}" >> "$GITHUB_ENV"
          echo "CXX=clang++-${{ env.CLANG_VERSION }}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        if: ${{ inputs.enable_rust }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup toolchain install "$RUST_NIGHTLY"
          rustup default "$RUST_NIGHTLY"
          rustup component add rust-src

      - name: Cache build directory
        if: inputs.ext-cache
        run: |
          wget -O cache.tar.gz ${{ inputs.ext-cache }}
          tar -zxf cache.tar.gz

      - name: Configure build (CMake + Ninja)
        run: |
          mkdir -p build
          cd build
          if [ -f CMakeCache.txt ]; then
            old_build=$(grep "# For build in directory: " CMakeCache.txt | cut -d ":" -f2 | sed "s/ //")
            sed -i "s#$old_build#$PWD#g" CMakeCache.txt
          fi
          cmake -G Ninja \
            -D CMAKE_BUILD_TYPE="${CH_BUILD_TYPE}" \
            -D ENABLE_RUST=${{ inputs.enable_rust && 'ON' || 'OFF' }} \
            ..

      - name: Build ClickHouse
        run: |
          cd build
          if [ "${CH_BUILD_TARGET}" = "all" ]; then
            ninja
          else
            ninja clickhouse
          fi

      - name: Smoke test the binary
        run: |
          ./build/programs/clickhouse local --query "SELECT version()"

      - name: Package binary
        run: |
          cd build/programs
          tar -czf clickhouse-binary.tar.gz clickhouse

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: clickhouse-binary-${{ env.CH_BUILD_TYPE }}
          path: build/programs/clickhouse-binary.tar.gz
          retention-days: 7
          if-no-files-found: error
