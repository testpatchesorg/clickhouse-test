name: Build ClickHouse via official CI (praktika/Docker)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit ClickHouse для сборки'
        required: false
        default: 'master'
        type: string
      build_job:
        description: 'Имя build job, как оно фигурирует в CI report ClickHouse'
        required: false
        default: 'Build (amd_release)'
        type: choice
        options:
          - 'Build (amd_release)'
          - 'Build (amd_debug)'
          - 'Build (arm_release)'
          - 'Build (arm_debug)'
          - 'Build (amd_asan)'
          - 'Build (amd_tsan)'

jobs:
  build:
    # Сам билд всё равно компилирует ClickHouse внутри контейнера, поэтому
    # требования к диску/CPU/времени те же, что и при ручной сборке —
    # praktika просто берёт на себя установку тулчейна и зависимостей.
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune -a -f || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Checkout ClickHouse with all submodules
        uses: actions/checkout@v4
        with:
          repository: ClickHouse/ClickHouse
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies for praktika
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify Docker is available
        run: docker version

      # Опционально: логин в Docker Hub снижает риск упереться в анонимные
      # rate limits при pull образа clickhouse/binary-builder.
      # Требует секретов DOCKERHUB_USERNAME / DOCKERHUB_TOKEN в репозитории.
      - name: Login to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Run official CI build job in Docker (ci.praktika)
        run: |
          python -m ci.praktika run "${{ inputs.build_job }}"

      - name: List build output
        run: ls -la ./ci/tmp/ || echo "ci/tmp not found"

      - name: Compute safe artifact name
        id: slug
        run: |
          SLUG=$(echo "${{ inputs.build_job }}" | tr -cs 'A-Za-z0-9._-' '_')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-build-${{ steps.slug.outputs.slug }}
          path: ci/tmp/
          retention-days: 7
          if-no-files-found: warn
